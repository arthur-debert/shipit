name: CI

# shipit's own CI — the FIRST thin caller of the wf-checks block (TOL01-WS05,
# ADR-0010/0040: consumer CI is routing-only YAML over shipit-published
# reusable workflows). The pre-cutover explicit steps — setup-pixi --locked,
# provision-lexd, `pixi run lint`, `pixi run test` — now live behind the
# block: the lane planner (`shipit ci plan`) reads .shipit.toml [lanes] and
# emits the lint + test matrix, and each job's `pixi run <run>` (lint-full /
# test, both provisioning lexd inline in their own env) preserves the exact
# pre-cutover behavior. shipit calls the block by LOCAL PATH so a PR editing
# the block is checked by the edited block; consumers pin
# `arthur-debert/shipit/.github/workflows/wf-checks.yml@v1` (ADR-0010).

on:
  push:
    branches: ['**']
  pull_request:

permissions:
  contents: read

jobs:
  checks:
    uses: ./.github/workflows/wf-checks.yml
  # The required-check NAME held stable across the cutover (PRD story 42, the
  # ADR-0010 laddered-cutover rule): branch protection requires `check`, and a
  # called workflow's jobs report as "checks / <lane>" — so this job keeps the
  # exact `check` name alive, succeeding iff the block succeeded. Result
  # propagation only (`if: always()` because a skipped required check would
  # count as satisfied — the verdict must be explicit).
  check:
    needs: checks
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Verdict
        env:
          RESULT: ${{ needs.checks.result }}
        run: |
          echo "wf-checks: $RESULT"
          test "$RESULT" = "success"
