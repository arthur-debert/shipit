name: CI

# shipit's own commit/push checks — now dogfooding `pixi run lint` (docs/prd/lint-checks.md). This is
# the migration the prior self-contained python job anticipated: CI flips to
# setup-pixi + pixi tasks, and the linters run --locked against pixi.lock so a
# bump arrives as an auto-PR, never silently (architecture.lex §2). The required
# check name (`check`) is unchanged, so the branch ruleset's required-status
# contract holds across the move.

on:
  push:
    branches: ['**']
  pull_request:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: prefix-dev/setup-pixi@v0.9.6
        with:
          pixi-version: v0.71.0
          locked: true
          environments: >-
            default
            lint
            test
      # Fetch the pinned lexd into the lint env before linting. The managed
      # `lint = "shipit lint"` task is a fixed plain string (no `provision-lexd`
      # depends-on), so the lex leg's tool is provisioned here explicitly (idempotent;
      # a no-op when the pin is already present) — issue #210, option (a). The task
      # is the managed `provision-lexd = "shipit provision lexd"` line: pin, platform
      # resolution, and checksum verification live in the binary (ADP00-WS03).
      - name: Provision lexd (lint env)
        run: pixi run -e lint provision-lexd
      - name: Lint
        run: pixi run -e lint lint
      # Provision lexd into the TEST env too, so the hermeticity invariance gate's
      # lex case runs instead of skipping. The Rust toolchain rides pixi.lock (the
      # `test` feature adds cargo/clippy/rustfmt), so it is already on PATH here;
      # lexd is the one lex tool off conda-forge, fetched at its pin the same way (#532).
      - name: Provision lexd (test env)
        run: pixi run -e test provision-lexd
      # Run the suite in the `test` env — default feature (core linters + pytest)
      # plus the Rust toolchain — so the rust/lex hermeticity cases (and their #526
      # xfail leak-signal) run on CI rather than local-only (#532).
      - name: Test
        run: pixi run -e test test
