name: CI

# shipit's own CI — the FIRST thin caller of the wf-checks block (TOL01-WS05,
# ADR-0010/0040: consumer CI is routing-only YAML over shipit-published
# reusable workflows). The pre-cutover explicit steps — setup-pixi --locked,
# provision-lexd, `pixi run lint`, `pixi run test` — now live behind the
# block: the lane planner (`shipit ci plan`) reads .shipit.toml [lanes] and
# emits the lint + test matrix, and each job's `pixi run <run>` (lint-full /
# test, both provisioning lexd inline in their own env) preserves the exact
# pre-cutover behavior. shipit calls the block by LOCAL PATH so a PR editing
# the block is checked by the edited block; consumers pin
# `arthur-debert/shipit/.github/workflows/wf-checks.yml@v1` (ADR-0010).

on:
  push:
    branches: ['**']
  pull_request:

# Superseded-run hygiene (#645): a branch with an open PR gets BOTH a push run
# and a pull_request run per push, and without a concurrency group those
# collisions left cancelled runs whose aggregate `check` read as a FAILED
# required check on the head. The group is scoped per EVENT and per ref/PR:
# `github.event_name` keeps the push run and the PR run of the same head in
# separate groups (they never cancel each other — both verdicts are legit),
# while within one event a new push cancels the now-superseded in-flight run
# for the same branch (push: github.ref) or the same PR (pull_request:
# PR number). A cancelled-because-superseded run belongs to an old head, and
# the `check` job below turns cancellation into a SKIP, so it is never the
# surviving verdict on the current head.
concurrency:
  group: ci-${{ github.event_name }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  checks:
    uses: ./.github/workflows/wf-checks.yml
  # The required-check NAME held stable across the cutover (PRD story 42, the
  # ADR-0010 laddered-cutover rule): branch protection requires `check`, and a
  # called workflow's jobs report as "checks / <lane>" — so this job keeps the
  # exact `check` name alive, succeeding iff the block succeeded. Result
  # propagation with one deliberate hole (#645): a CANCELLED block means the
  # run was superseded (the concurrency group above cancelled it for a newer
  # head), and the new head's run carries the verdict — so cancellation SKIPS
  # this job (a skipped required check counts as satisfied, i.e. neutral)
  # instead of failing it. Every completed result stays explicit via
  # `if: always()`: success passes, anything else — including a skipped
  # block — fails.
  check:
    needs: checks
    if: always() && needs.checks.result != 'cancelled'
    runs-on: ubuntu-latest
    steps:
      - name: Verdict
        env:
          RESULT: ${{ needs.checks.result }}
        run: |
          echo "wf-checks: $RESULT"
          test "$RESULT" = "success"
