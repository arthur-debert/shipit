name: shipit-release

# shipit's OWN release caller (#774, the 1.0.0 cutover) — the WS09 BLESSED
# per-stage dispatch shape (ADR-0054, workflows.lex §8), dogfooded verbatim
# on the publisher repo: one workflow_dispatch caller with a `stage` choice
# (full | prepare | build | sign | publish), one job per stage, each a
# single `uses:` line against the matching block, gated
# `if: inputs.stage == '...'`, forwarding `version`/`tag`/`run-id`/
# `unsigned` verbatim. Routing ONLY (ADR-0040): the release plan — matrix,
# live stages, the post-RC-guard endpoint set, required secrets — is
# preflight's, computed inside the blocks; nothing is re-derived or wired
# stage-to-stage here (that is exactly the consumer-owned wiring ADR-0040
# forbids and WS06 proved unwireable).
#
# Every ref is the FULL remote `arthur-debert/shipit/...@v1` form — the
# remote-ref scar (legacy release RC #823): a `./` reusable-workflow ref
# resolves against the top-level caller's repo, which HAPPENS to be shipit
# here, but this caller is the shape every consumer inherits, so it models
# the correct-by-construction form (and rides the same advance-major-moved
# `v1` the fleet rides, ADR-0010).
#
# shipit's release surface is the no-build artifact (.shipit.toml
# [artifacts.shipit]: gh-release only — the tag is the payload), so the
# plan's matrix is EMPTY and the build/sign stages are plan-proven no-ops:
# a `build` or `sign` dispatch re-derives the plan at the tag, fans over
# nothing, and skips (canary-confirmed empty-matrix behavior, #745). The
# choices stay offered because this caller dogfoods the blessed shape,
# never a trimmed variant.
#
# Secrets — THE PER-STAGE GRANT RULE (#896, the staged-dispatch live-fire
# scar): every stage job forwards the SAME plan-required secret set as
# `full`, trimmed only to the names its block DECLARES (GitHub refuses a
# caller forwarding an undeclared secret). wf-prepare declares the full
# universe — its preflight re-derives and re-validates the WHOLE plan's
# secret set at every entry — so a standalone `prepare` needs exactly
# `full`'s set, never a subset; wf-sign-mac declares the whole Apple/
# notary set (omit one — the live fire dropped ASC_API_KEY_BASE64 — and a
# standalone sign dies at notarize); wf-publish the endpoint tokens;
# wf-build nothing. A narrower per-stage grant is green on every
# full-chain run (wf-release forwards the secrets internally) and dead on
# the standalone dispatch; `shipit wf test` refuses the shape.
#
# shipit's own plan-required set is minimal — exactly:
#   RELEASE_TOKEN  prepare's tag+branch push through the ruleset (a
#                  GITHUB_TOKEN push would not re-trigger workflows, so
#                  the tag push could never fire advance-major.yml).
# gh-release rides the workflow's own GITHUB_TOKEN (no registry entry);
# there are no external endpoints, so no endpoint token is forwarded. The
# Apple signing set is not forwarded either: the plan carries no sign
# stage, and preflight would refuse a break-glass `--unsigned` on it. So
# the uniform rule lands here as: `release`/`prepare` forward
# RELEASE_TOKEN, and `build`/`sign`/`publish` forward nothing ONLY
# because RELEASE_TOKEN is not among their blocks' declared names — a
# consumer whose plan carries sign or registry endpoints forwards its
# full plan-required set at EVERY stage its blocks declare it on.

on:
  workflow_dispatch:
    inputs:
      version:
        description: >-
          The release version, consumed by `full`/`prepare`: a bare semver
          (1.0.0, 1.0.0-release-rc) or a bump word (major|minor|patch).
          Ignored by the tag-dispatched stages.
        required: false
        type: string
      stage:
        description: >-
          What to dispatch: the full composed chain (default) or ONE
          independently re-runnable stage block (per-stage dispatch,
          ADR-0054). `prepare` dispatches on `version`; `build`, `sign`
          and `publish` on `tag` (+ `run-id` for the artifact-consuming
          stages).
        required: false
        type: choice
        default: full
        options:
          - full
          - prepare
          - build
          - sign
          - publish
      tag:
        description: >-
          The release tag (v<version>), consumed by the `build`/`sign`/
          `publish` stage dispatches (ADR-0041: the version is read off
          the tag). Ignored by `full`/`prepare`.
        required: false
        type: string
      run-id:
        description: >-
          The SOURCE run id whose artifacts feed an artifact-consuming
          stage dispatch (`sign`, `publish`) — one source run per dispatch
          (workflows.lex §8). Ignored by the other stages.
        required: false
        type: string
      unsigned:
        description: >-
          Break-glass: flip a signing plan to the unsigned path. Forwarded
          verbatim; shipit's plan has no sign stage, so preflight refuses
          it here — offered because this caller dogfoods the blessed shape.
        required: false
        type: boolean
        default: false

# The standalone dispatch caller's grant (workflows.lex §8): `contents:
# write` for prepare's push and publish's gh-release, `actions: read` for
# the cross-run artifact downloads (`run-id` flips download-artifact onto
# the REST API). The downloading blocks deliberately declare NO
# `permissions:` key — a called workflow can only downgrade this token.
permissions:
  contents: write
  actions: read

jobs:
  release:
    if: inputs.stage == 'full'
    uses: arthur-debert/shipit/.github/workflows/wf-release.yml@v1
    with:
      version: ${{ inputs.version }}
      unsigned: ${{ inputs.unsigned }}
    secrets:
      RELEASE_TOKEN: ${{ secrets.RELEASE_TOKEN }}

  prepare:
    if: inputs.stage == 'prepare'
    uses: arthur-debert/shipit/.github/workflows/wf-prepare.yml@v1
    with:
      version: ${{ inputs.version }}
      unsigned: ${{ inputs.unsigned }}
    secrets:
      RELEASE_TOKEN: ${{ secrets.RELEASE_TOKEN }}

  build:
    if: inputs.stage == 'build'
    uses: arthur-debert/shipit/.github/workflows/wf-build.yml@v1
    with:
      tag: ${{ inputs.tag }}

  sign:
    if: inputs.stage == 'sign'
    uses: arthur-debert/shipit/.github/workflows/wf-sign-mac.yml@v1
    with:
      tag: ${{ inputs.tag }}
      run-id: ${{ inputs.run-id }}

  publish:
    if: inputs.stage == 'publish'
    uses: arthur-debert/shipit/.github/workflows/wf-publish.yml@v1
    with:
      tag: ${{ inputs.tag }}
      run-id: ${{ inputs.run-id }}
      unsigned: ${{ inputs.unsigned }}
