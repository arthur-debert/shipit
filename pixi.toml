# shipit's own pixi workspace — Step 3 lands shipit's first pixi integration
# (docs/legacy-prd/lint-checks.md). The substrate proven in Spike 0 stops being a spike here and
# becomes a real dependency of shipit's own repo: the lint checks are dogfooded on shipit
# from this step forward.
#
# The linters are required-check-path tools, so they are conda-forge packages
# PINNED in pixi.lock and CI runs `--locked` (architecture.lex §2) — version
# bumps arrive as auto-PRs, never silently. The lone exception is `lexd` (not on
# conda-forge), fetched at a pin by `shipit provision lexd` (the binary owns the
# pin — docs/legacy-prd/adoption.md).

[workspace]
name = "shipit"
description = "Portfolio standardization tooling — gh-setup, install, lint — on pixi."
channels = ["conda-forge"]
platforms = ["linux-64", "osx-arm64", "linux-aarch64"]

[dependencies]
# >>> shipit-managed launcher deps (do not edit; regenerate via `shipit install`) >>>
# The pinned `bin/shipit` launcher's one prerequisite (#758, TOL02-WS17
# #794): every workflow block (wf-checks and the whole wf-release family)
# runs `pixi run --locked ./bin/shipit ...`, and the ADR-0033 launcher
# resolves the repo's shipit pin via `uv tool run` — but hosted runners do
# not carry uv, so without this block the very first `./bin/shipit` dies 127
# before any verb runs. Provisioned from conda-forge under setup-pixi's
# lockfile-keyed cache (the #582 doctrine; the spike measured the launcher's
# uv resolve at 5s cold / 0-3s warm riding this env — no extra cache step).
# Anchored under [dependencies] — the DEFAULT env — because that is exactly
# the PATH a bare `pixi run --locked <task>` resolves. Pinned to the minor
# line of Layer 0's UV_PIN (bin/setup-dev-env.sh), so dev machines and CI
# provision the same uv; a lockstep drift test (tests/test_install.py) fails
# when the two move apart. `uv build` (the python bundle composition) rides
# this same entry.
uv = "0.11.*"
# <<< shipit-managed launcher deps <<<
# >>> shipit-managed python release deps (do not edit; regenerate via `shipit install`) >>>
# The python RELEASE-side publish tool (#801, closing open hole 2 of the
# TOL02-WS17 inventory): `shipit release publish`'s pypi endpoint uploads via
# `twine`, which hosted runner images do not carry and nothing else
# provisions — the upload died 127 on every stock pypi consumer. Delivered on
# the python toolchain signal (a tracked pyproject.toml), anchored under
# [dependencies] — the DEFAULT env — because wf-publish executes shipit via
# bare `pixi run --locked ./bin/shipit`, and twine must be on THAT run's
# PATH. Provisioned from conda-forge under setup-pixi's lockfile-keyed cache
# (the #582 doctrine: the release run NEVER installs at run time — publish
# fails loudly naming this reconcile instead). Pinned to the minor line; a
# bump is one data edit, rolled out on each consumer's next `shipit install`
# reconcile. If this repo no longer ships python (the last pyproject.toml is
# gone), delete this block and its `pixi.toml#shipit-python-release-deps`
# entry in .shipit.toml's [managed] table — a reconcile only ADDS toolchain
# blocks, it never retires one.
twine = "6.2.*"
# <<< shipit-managed python release deps <<<
# (For shipit-self the entry is redundant-but-harmless, like the managed lint
# block: the dogfood repo's declined bin/shipit execs shipit FROM SOURCE via
# the pixi env — see [managed.decline] in .shipit.toml.)
python = "3.13.*"

# The lint toolchain rides in the DEFAULT env (issue #210, option (a)): `shipit
# install` writes a managed `[tasks] lint = "./bin/shipit lint"` into the default
# env (the task rides the repo's pinned launcher, not a PATH `shipit` — #481,
# ADR-0033), and `shipit lint` (verbs/lint.py) SHELLS OUT to these binaries — so
# they must be
# on PATH in the default env for the managed task to work as installed. This aligns
# shipit-self with the standard consumer layout (architecture.lex §5/§7: one lint
# definition, thin managed tasks) rather than pinning an env-specific override the
# reconcile would surface as drift forever. The `-e lint` environment keeps its own
# `lint` task (below) — the lexd-provisioning, lefthook/CI-pinned canonical path —
# and inherits these same deps through the default feature.
#
# The linters are required-check-path tools, so they are conda-forge packages PINNED
# in pixi.lock and CI runs `--locked` (architecture.lex §2) — version bumps arrive as
# auto-PRs, never silently. The lone exception is `lexd` (not on conda-forge), fetched
# at a pin by `shipit provision lexd` (the managed `provision-lexd` task).
ruff = "0.15.*"
# PINNED DOWN to 0.10.*: 0.11.0 has an SC2218 reaching-definitions false positive
# that reds correct code near subshells — see the managed lint-deps block below for
# the full note. Kept in lockstep with that block (dogfood drift test).
shellcheck = "0.10.*"
go-shfmt = "3.*"               # conda-forge name for the `shfmt` binary
yamllint = "1.38.*"
prettier = "3.8.*"
markdownlint-cli = "0.49.*"
# GitHub Actions workflow gate — the actions Lang of `shipit lint` (TOL01-WS04):
# workflow YAML under `.github/workflows/` routes to actionlint IN ADDITION to
# yamllint. Kept in lockstep with the managed lint-deps block below (dogfood
# drift test).
actionlint = "1.7.*"
lefthook = "2.1.*"
# curl performs `shipit provision lexd`'s pinned-release fetch (through the one
# exec seam, ADR-0028); pinning it here keeps the lint checks from depending on
# a host-provided curl ("identical everywhere").
curl = "*"

[pypi-dependencies]
# shipit itself, editable — `shipit lint` is the lint orchestrator, so the env
# that runs the lint checks must carry the package under test.
shipit = { path = ".", editable = true }

# The ADR-0015 build env, declared where pixi OWNS it — set on EVERY activation
# (`pixi run` / `pixi shell` / `shell-hook`) rather than hand-built in Python and
# applied only to the provisioning subprocess (COR01: `sccache_env()` removed from
# `tree/create.py`). Because pixi expands `$PIXI_PROJECT_ROOT` at activation time,
# these resolve to PER-TREE absolute paths — each Tree is its own clone with its own
# project root — so the per-Tree `target/` + cross-Tree sccache guarantees hold, and
# the env now reaches the agent's OWN in-Tree `cargo` (not just provisioning), which
# it did not before. Consumer repos that build Rust declare the same block; shipit
# dogfoods it here (it also documents the pattern — docs/dev/pixi).
[activation.env]
# Per-Tree target dir: Cargo locks `target/`, so a shared one serializes the fleet.
CARGO_TARGET_DIR = "$PIXI_PROJECT_ROOT/target"
# sccache keys on the absolute build path; pinning the base dir to the Tree root is
# what lets distinct Tree paths share the cross-Tree cache.
SCCACHE_BASEDIRS = "$PIXI_PROJECT_ROOT"
# sccache disables incremental anyway, and incremental bakes absolute paths that
# break under any copy.
CARGO_INCREMENTAL = "0"

[tasks]
# >>> shipit-managed tasks (do not edit; regenerate via `shipit install`) >>>
changelog = "./bin/shipit changelog"
lint = "./bin/shipit lint"
logs = "./bin/shipit logs"
provision-lexd = "./bin/shipit provision lexd"
# <<< shipit-managed tasks <<<

# pytest lives here (not a linter) so the `test` task — defined in the `test`
# FEATURE below, alongside the Rust toolchain — has it, without pulling it into the
# lint environment's required-check surface.
[dependencies.pytest]
version = ">=8"

# The `test` FEATURE owns the whole test surface: the Rust toolchain the hermeticity
# invariance gate (tests/test_lint.py, LNT01-WS02 #515) needs for its rust cases, AND
# the `test` task itself (below). The `test` environment further down composes this
# feature with the default feature (core linters + pytest + shipit editable). Because
# the task lives in EXACTLY ONE feature, it exists in EXACTLY ONE environment (`test`)
# — so bare `pixi run test` resolves UNAMBIGUOUSLY to that env, and the documented
# developer command runs the SAME full gate CI runs (`pixi run -e test test`). That
# closes the local/CI coverage split (#532) in the other direction: a contributor's
# `pixi run test` can no longer go green by skipping the rust/lex cases CI executes.
# The Rust toolchain (cargo + clippy-driver/cargo-clippy + rustfmt/cargo-fmt) is a
# conda-forge package PINNED in pixi.lock — the invariance gate exercises the real
# binaries, so like the required-check linters it must move only via an auto-PR bump.
# lexd, the one lex tool not on conda-forge, is fetched at its pin INLINE by the
# `test` task cmd (`shipit provision lexd` before pytest, IN this env) — NOT a
# `provision-lexd` depends-on, which pixi would run in the default env; see the task
# comment below for why.
[feature.test.dependencies]
rust = "1.96.*"
# The act harness behind `shipit wf test` (TOL01-WS04): the real-act smoke in
# tests/test_wf.py runs a fixture workflow under act in the stock-Ubuntu
# container. Pinned here (conda-forge, pixi.lock) so the smoke runs wherever
# the full gate runs; docker itself is host-provided (GH runners and dev
# machines carry it) — the smoke skips, loudly, when the daemon is absent.
act = "0.2.*"

[feature.test.tasks]
# The full-gate suite, THROUGH the test verb (TOL01-WS01, ADR-0039): the task is a
# thin caller of `shipit test`, which walks `.shipit.toml [toolchains]` and
# dispatches shipit's one python leg to its registry default (pytest) — the same
# implementation a hook or CI job runs. It rides `./bin/shipit`, which on
# shipit-self resolves to the editable install in this env (the code under test).
# This task stays in the `test` FEATURE (not the managed default-[tasks] test
# caller, which the install reconcile deliberately skips here — see the
# PixiTaskConflict guard): the suite needs this env's Rust toolchain, and lexd
# (not on conda-forge) is provisioned INLINE — the cmd runs `shipit provision
# lexd` (idempotent — a no-op when the pin is already installed) before the verb,
# IN this task's own env. Inline, NOT a `provision-lexd` depends-on: a bare
# `pixi run test` auto-selects this env for the `test` task, but pixi runs a
# depends-on in the depended task's HOME env, and the managed `provision-lexd` is
# a DEFAULT-feature task — so a depends-on would provision lexd into
# `.pixi/envs/default/bin`, NOT this env, and the composed test env does NOT
# layer the default env's bin onto PATH. So `shutil.which("lexd")` would miss it and
# the lex cases would silently `skipif`-skip on a clean `pixi run test` (the default
# bin only leaks in when a shell has the default env separately activated). Running the
# provision inline keeps it in THIS env's `CONDA_PREFIX`, so bare `pixi run test` and
# CI's `pixi run -e test test` are byte-identical and both land lexd in the test env.
# Without rust+lexd the rust/lex cases `skipif` their absent binaries and the
# `xfail(strict)` "leak closed → reminder" signal for clippy/lexd (#526) would fire
# local-only; this env is what makes them run everywhere.
test = { cmd = "./bin/shipit provision lexd && ./bin/shipit test" }

# The `lint` FEATURE carries the MANAGED fleet-pinned dependency block below —
# the exact block `shipit install` delivers to every consumer (ADP00,
# docs/legacy-prd/adoption.md: the managed set owns the consumer environment). shipit
# self-installs at Tree provisioning, so its own manifest must carry the block
# verbatim for the reconcile to stay a NOOP; a drift test
# (tests/test_install.py) asserts these pins agree with the hand-written
# default-env toolchain above (the dogfood guarantee). For shipit itself the
# block is redundant-but-harmless: the same specs already ride in the DEFAULT
# env (issue #210, option (a)) and the `lint` environment inherits them through
# the default feature. The feature deliberately does NOT define its own `lint` task:
# `lint` lives in EXACTLY ONE place — the managed `[tasks] lint = "./bin/shipit lint"` in the
# default env above — so a bare `pixi run lint` resolves UNAMBIGUOUSLY (a duplicate
# `lint` in both the default feature and this one is what historically made bare
# `pixi run lint` ambiguous across default/lint/review; the lefthook `-e lint` pin was
# the mitigation — see lefthook.yml). `pixi run -e lint lint` runs that same managed
# task INSIDE the lint env (the canonical, lefthook/CI-pinned path). What stays here is
# the lexd-dependent helpers (fmt, regen-roles, install-hooks). Because the managed
# `lint` is a fixed plain-string task, it cannot carry a `provision-lexd` depends-on;
# instead lexd is provisioned onto the lint env's PATH by the setup tasks that gate
# it — `install-hooks` (the one-time hook activation every dev runs on a fresh clone)
# depends on `provision-lexd` (the MANAGED task above: `shipit provision lexd`,
# idempotent — a no-op when the pin is already installed), so lexd is fetched into
# `.pixi/envs/lint/bin/` at hook-setup time and PERSISTS there for every subsequent
# `-e lint lint` the pre-commit / pre-push hooks run. CI's lint lane provisions it
# the same way, inline in the `lint-full` task below (the wf-checks matrix job's
# `run`, TOL01-WS05 — the retired explicit ci.yml step). This keeps lexd off the
# `lint`/`lefthook.yml` surface while never leaving a fresh clone's lex leg
# un-provisioned. The pin, platform resolution, and checksum verification live in
# the binary (src/shipit/provision/lexd.py, ADP00-WS03) — there is no repo-local
# provisioning script anymore.
[feature.lint.dependencies]
# >>> shipit-managed lint deps (do not edit; regenerate via `shipit install`) >>>
# The fleet-pinned lint toolchain (arthur-debert/shipit docs/legacy-prd/adoption.md: the managed set owns
# the consumer environment). Canonical versions live HERE — a bump is one data
# edit, rolled fleet-wide on each consumer's next `shipit install` reconcile.
ruff = "0.15.*"
# shellcheck is PINNED DOWN to 0.10.* (not 0.11): shellcheck 0.11.0 has an SC2218
# reaching-definitions false positive — a call to an EARLIER-defined function is
# flagged "defined later" when a subshell (`$(...)`, a pipeline component, `<(...)`)
# sits near the call, reddening the hermetic gate on CORRECT code across 5+ fleet
# repos. 0.11.0 is the latest upstream (no fixed 0.11.x yet); restore 0.11+ when
# upstream fixes it.
shellcheck = "0.10.*"
# conda-forge name for the `shfmt` binary
go-shfmt = "3.*"
yamllint = "1.38.*"
prettier = "3.8.*"
markdownlint-cli = "0.49.*"
# GitHub Actions workflow gate — the actions Lang of `shipit lint` (TOL01-WS04)
actionlint = "1.7.*"
lefthook = "2.1.*"
# <<< shipit-managed lint deps <<<

[feature.lint.tasks]
fmt = { cmd = "shipit lint --fix", depends-on = ["provision-lexd"] }
# The lint LANE's run (TOL01-WS05; .shipit.toml [lanes].lint): the same managed
# `./bin/shipit lint` the hooks ride, with the lex leg's lexd provisioned INLINE
# first — the `test` task's exact pattern, for the same reason (a depends-on
# would provision lexd into the DEFAULT env's bin, which this env does not layer
# onto PATH; inline lands it in THIS env's prefix, idempotent). It cannot be
# named `lint`: that name is the managed fixed-string task in the default
# [tasks] block, and a second `lint` here would re-create the historical
# bare-`pixi run lint` ambiguity across environments (see the feature comment
# above). Defined ONLY in this feature, so it exists in EXACTLY ONE env (lint)
# and bare `pixi run lint-full` resolves unambiguously — the wf-checks matrix
# job's `pixi run --locked lint-full` and a laptop run are byte-identical
# (checkout-provision-lint, exactly what CI's explicit steps did pre-cutover).
lint-full = { cmd = "./bin/shipit provision lexd && ./bin/shipit lint" }
# One command from a fresh clone to working lint checks (the `--install-hook` equiv):
# activates the git hooks AND (via `provision-lexd`) fetches the pinned lexd into the
# lint env, so the pre-commit / pre-push `pixi run -e lint lint` the hooks fire find
# lexd on PATH without the managed `lint` task needing a depends-on it cannot carry.
install-hooks = { cmd = "lefthook install", depends-on = ["provision-lexd"] }
# Re-flow every role-prompt surface from the lex fragments (HAR01-WS03, ADR-0011):
# mirror src/shipit/data/roles/*.lex -> .md, then compose the agent-defs, the
# bundled coordinator deny slice, and the AGENTS.md union. Needs lexd + prettier
# (mirroring) and shipit (the generator), all on PATH in the lint env.
regen-roles = { cmd = "bash tools/regen-roles.sh", depends-on = ["provision-lexd"] }

# The `review` env carries the `review` extra (PyJWT, to sign the App JWT) so the
# normal `shipit pr review` path AND the opt-in funnel-verification harness can
# run. It is NON-DEFAULT — never part of `test` / CI / the `lint` (required-check)
# surface, and off the locked `pixi.lock` check (architecture.lex §2) — because the
# `review` extra is a PyPI dependency, not a conda-forge pinned tool. An agent env
# that needs to post a local review provisions the extra here instead of a manual
# `pip install 'shipit[review]'`. See docs/dev/review-app-provisioning.md.
[feature.review.pypi-dependencies]
shipit = { path = ".", editable = true, extras = ["review"] }

[feature.review.tasks]
# The LIVE-GitHub review-funnel verification harness — opt-in (needs Doppler App
# creds + a canary PR), refuses to run without an explicit --repo/--pr. Run e.g.:
#   pixi run -e review verify-funnel --repo arthur-debert/shipit-canary --pr <N>
verify-funnel = "python -m shipit.review.funnel_verify"
# Per-consumer App-liveness verification (INS01): is each local-agent reviewer App
# installed on the target repo's owner with `checks: write`? A cheap read (mints the
# App token + inspects granted permissions — NO check-run create). Needs Doppler App
# creds + PyJWT (the `review` extra), so it lives here, off CI. Exits 0 (all live) / 1
# (instruct), so a rollout can block on it mechanically. Run e.g.:
#   pixi run -e review verify-apps arthur-debert/shipit-canary
verify-apps = "shipit verify-apps"

# The `dogfood` env carries shipit editable (it drives `shipit spawn subagent` as a
# subprocess) for the OPT-IN, LIVE end-to-end spawn-verification harness. Like
# `review` it is NON-DEFAULT — never part of `test` / CI / the `lint` (required-check)
# surface, and off the locked `pixi.lock` check — because it spawns real `claude`
# Runs and opens real PRs (token spend) against a SCRATCH checkout. Its assertion +
# wiring logic is regression-covered in the normal test checks
# (`tests/test_spawn_dogfood.py`) with every live seam FAKED. See
# docs/dev/spawn-dogfood-verification.md.
[feature.dogfood.pypi-dependencies]
shipit = { path = ".", editable = true }

[feature.dogfood.tasks]
# The LIVE spawn-dogfood verification harness (TRE03-WS05) — opt-in (spawns real
# claude Runs, opens real PRs), refuses to run without an explicit scratch checkout +
# target. Run it deliberately, e.g.:
#   pixi run -e dogfood verify-spawn --scratch ~/h/scratch/shipit \
#     --repo arthur-debert/shipit --epic TRE03 --ws 5 --issue 159
verify-spawn = "python -m shipit.spawn.dogfood"

[environments]
# >>> shipit-managed environments (do not edit; regenerate via `shipit install`) >>>
lint = ["lint"]
# <<< shipit-managed environments <<<
# The full-gate test env: default feature (core linters + pytest + shipit editable)
# plus the `test` feature's Rust toolchain AND its `test` task, so the hermeticity
# invariance gate runs its rust/lex cases instead of skipping them (#532). It is the
# ONLY env carrying the `test` task, so bare `pixi run test` auto-selects it — the
# developer command and the CI command (`pixi run -e test test`) run the same gate.
# lexd is provisioned onto the run's PATH at its pin INLINE by the `test` task cmd
# (`shipit provision lexd` before the test verb, landing in THIS env's own bin). NOT a
# `provision-lexd` depends-on: pixi would run it in the default env, whose bin this
# env does not layer onto PATH — see the task comment above.
test = ["test"]
review = ["review"]
dogfood = ["dogfood"]
