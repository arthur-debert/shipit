# shipit's own pixi workspace — Step 3 lands shipit's first pixi integration
# (docs/prd/lint-gate.md). The substrate proven in Spike 0 stops being a spike here and
# becomes a real dependency of shipit's own repo: the gate is dogfooded on shipit
# from this step forward.
#
# The linters are required-check-path tools, so they are conda-forge packages
# PINNED in pixi.lock and CI runs `--locked` (architecture.lex §2) — version
# bumps arrive as auto-PRs, never silently. The lone exception is `lexd` (not on
# conda-forge), fetched at a pin by tools/provision-lexd.sh.

[workspace]
name = "shipit"
description = "Portfolio standardization tooling — gh-setup, install, lint — on pixi."
channels = ["conda-forge"]
platforms = ["linux-64", "osx-arm64", "osx-64", "linux-aarch64"]

[dependencies]
python = "3.13.*"

[pypi-dependencies]
# shipit itself, editable — `shipit lint` is the gate's orchestrator, so the env
# that runs the gate must carry the package under test.
shipit = { path = ".", editable = true }

[tasks]
# Provisional test task (the full pixi-test encapsulation is Step 5); shipit
# supplies its own `test` so CI's required `check` keeps running the suite.
test = "python -m pytest -q"

# pytest lives here (not a linter) so `pixi run test` has it without pulling it
# into the lint environment's required-check surface.
[dependencies.pytest]
version = ">=8"

[feature.lint.dependencies]
# Pins ported from release-core toolset.py as a baseline, RE-PINNED through
# conda-forge (prettier + markdownlint-cli ARE on conda-forge, so the npm path
# the roadmap anticipated is unnecessary — everything below is locked).
ruff = "0.15.*"
shellcheck = "0.11.*"
go-shfmt = "3.*"               # conda-forge name for the `shfmt` binary
yamllint = "1.38.*"
prettier = "3.8.*"
markdownlint-cli = "0.49.*"
lefthook = "2.1.*"
# curl provisions the pinned lexd (tools/provision-lexd.sh); pinning it here
# keeps the gate from depending on a host-provided curl ("identical everywhere").
curl = "*"

[feature.lint.tasks]
# lexd is not on conda-forge; fetch the pinned prebuilt before every gate run
# (idempotent). The gate depends on it, so CI and the hook provision identically.
provision-lexd = "bash tools/provision-lexd.sh"
lint = { cmd = "shipit lint", depends-on = ["provision-lexd"] }
fmt = { cmd = "shipit lint --fix", depends-on = ["provision-lexd"] }
# One command from a fresh clone to a working gate (the `--install-hook` equiv).
install-hooks = "lefthook install"

[environments]
lint = ["lint"]
