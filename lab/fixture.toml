id = "core-G1"
pr = "core-440"
file = "phos-bench/src/bin/gpu_compare.rs"
severity = "major"
verdict = "real"
confirmed = true
claim = "gpu_fallback_reason estimates readback staging cost as w*h*16, ignoring the 256-byte row padding read_texture allocates, so widths needing padding are mis-reported GPU-OK and then panic at readback"
aliases = ["`gpu_fallback_reason` compares `max_buffer_size` against the unpadded RGBA byte count, but `GpuContext::read_texture` allocates a row-padded readback buffer using `COPY_BYTES_PER_ROW_ALIGNMENT`. For widths that are not already aligned, this can report a size as GPU-capable even though the actual readback buffer exceeds the device limit; the benchmark would then drive the path it meant to classify as fallback."]
[labels.provenance]
kind = "fix-commit"
ref = "f211ab3"

[[labels]]
id = "core-G2"
pr = "core-440"
file = "phos-editor/src/graph_session.rs"
severity = "minor"
verdict = "real"
confirmed = true
claim = "the gpu: None docstring claims the field is None only on headless builds, but software adapters make it Some on headless too"
aliases = ["With the hardware-require flag unset, software adapters on headless CI still yield a live session GPU, contradicting the field documentation that None means no GPU available on headless runners.", "`GraphSession` now initializes a GPU for every native session, but it passes `require_hw = false` in normal runs, and `GpuContext::new` only rejects `DeviceType::Cpu` software adapters when `require_hw` is true. On headless Linux setups with llvmpipe/lavapipe, this can silently engage the GPU path through a CPU rasterizer for ordinary sessions and tests, making display/color nodes slower and no longer byte-identical to the CPU/wasm path."]
[labels.provenance]
kind = "fix-commit"
ref = "f211ab3"

