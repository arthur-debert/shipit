# The rust RELEASE toolchain (#801, closing open hole 1 of the TOL02-WS17
# inventory): hosted runner images no longer carry Rust, and the managed rust
# LINT block anchors in the lint feature — an env the release runs' bare
# `pixi run --locked ./bin/shipit` never resolves. So `cargo` itself (prepare's
# subcommand dispatch, `cargo build`, `cargo publish`/`cargo metadata`)
# anchors HERE, in the DEFAULT env's [dependencies], exactly the PATH every
# wf-release stage executes with. conda-forge's `rust` is the official
# toolchain (cargo included), provisioned under setup-pixi's lockfile-keyed
# cache (the #582 doctrine: the release run NEVER installs at run time).
# Deliberately a SINGLE-KEY block, SEPARATE from the cargo-edit release-deps
# block: a consumer already pinning `rust` in its own [dependencies] (the
# pre-#801 consumer-side workaround) keeps its pin via the PixiKeyConflict
# first-splice guard WITHOUT losing cargo-edit delivery — a shared block
# would be skipped whole. Pinned in lockstep with the rust lint block
# (drift-tested); a bump is one data edit per block, same diff. If this repo
# no longer ships rust (the last Cargo.toml is gone), delete this block and
# its `pixi.toml#shipit-rust-release-toolchain` entry in .shipit.toml's
# [managed] table — a reconcile only ADDS toolchain blocks, never retires one.
rust = "1.96.*"
