# The shipit-own skill store moved out of the top-level `skills/` dir (#921):
# `skills/` collides with the PUBLIC skills convention a repo uses to publish its
# own skills, so `shipit install` used to pollute a consumer's `skills/`. The
# store is now `.shipit-skills/` (dedicated, dot-prefixed, non-colliding). These
# entries retire the old `skills/<name>/…` copies shipit previously delivered so
# a consumer sheds them on the next install — while leaving ANY consumer-authored
# `skills/` file untouched (it is not in this manifest). Each `pristine` list
# carries the current content hash AND, where it differs, the last-shipped
# (pinned) hash, so a consumer on either version gets the clean delete; a locally
# edited copy is surfaced and kept, never destroyed.

