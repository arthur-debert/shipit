# Retired files — paths shipit used to distribute (or release-sync-era debris)
# that must no longer exist in a consumer. `shipit install` runs a retired-files
# pass over these entries (docs/prd/rvw01-sole-requester.md, ADR-0031): a file
# whose content matches one of the known pristine hashes is deleted; a file whose
# content differs from EVERY known version is kept with a warning (never destroy
# local edits — the same safety philosophy as the [managed] pristine-hash
# manifest); an absent file is a no-op.
#
# The manifest is data: retiring the next file is an entry here, not code.
# Each `pristine` list carries every known historical version's sha256, so a
# consumer stuck on an older copy still gets the clean delete.

