# Retired HOOK ENTRIES (#619) — consumer-local entries in a hooks-event array
# that `shipit install` removes fleet-wide (the retired-files idea, extended to
# entries inside a file shipit does not own outright). An entry is identified
# by the command substring `marker` inside the `event` array of `file`; an
# entry whose command also carries the managed `shipit hook` marker is
# shipit's OWN and is NEVER touched (the managed SessionStart command itself
# runs ./bin/setup-dev-env.sh inline, which the marker below would otherwise
# match). Retiring the next entry is data here, not code.

[[retired_hooks]]
# The legacy release-core boot resolver hook (ADR-0003): ran
# `bin/install-release-core` on every session start. Superseded by the
# shipit-managed SessionStart hook; the script itself is retired above.
file = ".claude/settings.json"
event = "SessionStart"
marker = "bin/install-release-core"

[[retired_hooks]]
# The consumer-local duplicate of the managed SessionStart hook's inline
# `setup-dev-env.sh` run (double pixi pre-solve per session start) — the
# TOL01 sweep removed this by hand in most repos (padz#174 precedent);
# this entry retires the stragglers (simple-gal-ui, #619).
file = ".claude/settings.json"
event = "SessionStart"
marker = "bin/setup-dev-env.sh"
