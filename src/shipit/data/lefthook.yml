# Thin lefthook caller — ALL gate logic lives in the `shipit lint` binary,
# invoked through `pixi run lint`. lefthook is intentionally dumb
# (docs/prd/lint-gate.md, architecture.lex §7): one definition, run everywhere, so CI and the hooks
# cannot drift into two transcriptions of the rules.
#
# Whole-tree (not staged-only) for now: `pixi run lint` lints `git ls-files`, so
# a green hook never lies about an unstaged edit. `pixi run test` runs in
# pre-commit too, so a commit blocks on BOTH lint and test (the commit/push gate).
pre-commit:
  commands:
    lint:
      run: pixi run lint
    test:
      run: pixi run test

pre-push:
  commands:
    lint:
      run: pixi run lint
