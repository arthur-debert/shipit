# Thin lefthook caller, managed by shipit (regenerate via `shipit install`) —
# ALL lint-check logic lives in the `shipit lint` binary, invoked through
# `pixi run -e lint lint`. lefthook is intentionally dumb: one definition, run
# everywhere, so CI and the hooks cannot drift into two transcriptions of the
# rules. Every task and environment invoked here is satisfied by the
# shipit-managed pixi.toml blocks (the `[tasks]` line, the lint
# feature/dependency block, the `[environments]` definition), so the hooks are
# green on a stock consumer right after `shipit install` — nothing repo-local
# is referenced.
#
# The `-e lint` is pinned (not bare `pixi run lint`): an inherited
# `PIXI_PROJECT_MANIFEST` (a commit made from inside another pixi project's
# activated environment) makes bare `pixi run lint` ambiguous across
# environments and the hook dies. Pinning the environment removes the
# ambiguity regardless of the inherited env.
#
# Whole-tree (not staged-only): `pixi run -e lint lint` lints `git ls-files`,
# so a green hook never lies about an unstaged edit.
#
# Repo-specific hook legs do NOT belong in this file — a local edit surfaces
# as an OVERRIDE at the next `shipit install` reconcile, forever. Put them in
# a committed `lefthook-local.yml`, which lefthook merges over this config
# natively (shipit's own repo does exactly that for its .lex→.md mirror leg).
# `piped: true` plus `priority: 2` on the lint command keep the slot open: a
# local pre-commit leg with a lower priority runs first, and the pipe stops on
# its failure before lint reads the tree.
pre-commit:
  piped: true
  commands:
    lint:
      priority: 2
      run: pixi run -e lint lint

pre-push:
  commands:
    lint:
      run: pixi run -e lint lint
    # The classification tripwire (#423): block the push while the branch's
    # PR has unclassified findings in its latest review round — the same
    # CLASSIFY message the `pr next`/`pr status` gate reports (that gate is
    # the arbiter; this is the fail-fast act-time seam). The verb fails OPEN
    # on any inability to read the PR state, so a gh outage never blocks git.
    classify-gate:
      run: pixi run -e lint shipit pr push-gate

# Hook-witnessed dev-cycle tier (ADR-0032 / LOG04): POST-commit — the commit
# exists and has a sha to record — emit `commit.created` into the durable
# per-repo JSONL log via the constrained write verb. Registered names only;
# domain keys (session from the env, epic/ws from the branch) are picked up by
# the verb, not passed here. `--from-hook` makes the verb fail OPEN (exit 0,
# WARNING) so a broken log path can never block git. Same pinned `-e lint` env
# as the lint caller above (`pixi run` passes the outer PATH through, so the
# `shipit` on your PATH is reachable and the pin dodges the inherited
# PIXI_PROJECT_MANIFEST ambiguity).
post-commit:
  commands:
    dev-cycle-event:
      run: pixi run -e lint shipit log event commit.created --from-hook
