# shipit policy config. Owns POLICY (secrets, reviewers, the path→toolchain map,
# pristine hashes); pixi.toml owns PROVISIONING. They describe different layers,
# so there is no split-brain. See docs/dev/architecture.lex §6.

# [secrets] — the single source of truth for repo Actions secrets. Each table key
# is the GitHub secret NAME; the value names exactly one source:
#
#   NAME = { doppler = "KEY" }      # doppler secrets get KEY --plain --project github --config prd
#   NAME = { env = "VAR" }          # value of $VAR in the environment
#   NAME = { prompt = true }        # ask interactively
#
# Add `optional = true` to any entry whose absence should be a skip, not an error:
#
#   NAME = { doppler = "KEY", optional = true }
#
# `shipit gh-setup` resolves each and pushes it; a changed secret is re-set to its
# new value. The same table feeds the cross-org workflow caller's `secrets:` block.
[secrets]
# RELEASE_TOKEN backs the Copilot-review caller (and, later, cross-repo release
# pushes). Sourced from the local gh CLI token env var, which carries repo +
# workflow scope. Optional: GH_TOKEN is not always exported (gh often keeps the
# token in the keychain), and the repo secret is already set — so an absent
# GH_TOKEN skips the re-set rather than aborting gh-setup; when present it rotates
# the value. More entries land as shipit's release workflows arrive (Steps 4–6).
RELEASE_TOKEN = { env = "GH_TOKEN", optional = true }

# Local-agent review App credentials (PRF01-WS07). The codex/agy review backends
# post AS their GitHub App (`adr-codex-review[bot]` / `adr-agy-review[bot]`); the
# App private key (PEM) + app id are provisioned into Doppler `github/prd` under
# these keys. Mapping them here makes `gh-setup` push them as repo Actions secrets
# so a CI-side review has the same credentials the LOCAL path sources directly
# from Doppler via `secretsrc` — CI parity, single source of truth. shipit requires
# these local reviewers on its OWN PRs: `codex` and `agy` are in the [reviewers]
# required set below — blocking the flip-to-Ready — so every shipit PR is reviewed
# by both (alongside Copilot).
CODEX_REVIEW_APP_PRIVATE_KEY = { doppler = "CODEX_REVIEW_APP_PRIVATE_KEY" }
CODEX_REVIEW_APP_ID          = { doppler = "CODEX_REVIEW_APP_ID" }
AGY_REVIEW_APP_PRIVATE_KEY   = { doppler = "AGY_REVIEW_APP_PRIVATE_KEY" }
AGY_REVIEW_APP_ID            = { doppler = "AGY_REVIEW_APP_ID" }

# [reviewers] — the required-reviewer SET for THIS repo's PRs (overrides the
# shipped Copilot-only default; see src/shipit/prstate/reviewers_config.py). The
# map KEYS are the required reviewers — all must be DONE to flip Ready. shipit
# dogfoods its own local-review backends: `codex` and `agy` post as their App
# bots and block the flip-to-Ready alongside Copilot. Review-once (rerun defaults
# OFF): a token-billed local agent re-runs only on explicit opt-in, never per push.
[reviewers]
copilot = {}
codex = {}
agy = {}

# [project] — the CONSUMER-OWNED, un-validated namespace. shipit validates that
# top-level tables are KNOWN (so a typo dies fast), but `[project]` (alias:
# `[custom]`) is the well-known escape hatch whose SUBTREE shipit reads but does NOT
# police the shape of — consumers put their own free-form policy here.
#
# [project.portfolio] — the AUTHORITATIVE, version-controlled list of repos shipit is
# being rolled out across, grouped by STACK (workstream). It lives HERE, in git — never
# in agent memory: a session reads this table instead of reconstructing a list from
# `~/h` sibling dirs (the source of the recurring wrong list). Each entry carries the
# `repo` (owner/name) and its `path` (hermetic-clone checkout layout). Transcribed from
# the now-stale release/managed-repos.yaml; THIS is the source of truth. A future
# `shipit portfolio` verb can consume it.
#
# Secondary stacks are deferred (out of scope for now): the brew-tap stack
# (arthur-debert/homebrew-tools — formulas land via release-workflow pushes, not the PR
# loop), the gh-action stack (arthur-debert/simple-gal-action, #108), and release/
# itself (the source-of-truth repo, which needs its own check set). Add them when those
# workstreams pick up.
[project.portfolio]
phos = [
  { repo = "phos-editor/app", path = "phos/phos-app", expect_verify_fail = "the parity verify needs the phos sibling checkouts, absent in the hermetic clone" },
  { repo = "phos-editor/core", path = "phos/phos-core" },
]
burgertocow = [{ repo = "arthur-debert/burgertocow", path = "burgertocow" }]
clapfig = [{ repo = "arthur-debert/clapfig", path = "clapfig" }]
dodot = [{ repo = "arthur-debert/dodot", path = "dodot" }]
lex = [
  { repo = "lex-fmt/comms", path = "lex-fmt/comms" },
  { repo = "lex-fmt/lex", path = "lex-fmt/lex" },
  { repo = "lex-fmt/lexed", path = "lex-fmt/lexed" },
  { repo = "lex-fmt/nvim", path = "lex-fmt/nvim" },
  { repo = "lex-fmt/tree-sitter-lex", path = "lex-fmt/tree-sitter-lex" },
  { repo = "lex-fmt/vscode", path = "lex-fmt/vscode" },
  { repo = "lex-fmt/zed-lex", path = "lex-fmt/zed-lex" },
]
padz = [{ repo = "arthur-debert/padz", path = "padz" }]
rustloc = [{ repo = "arthur-debert/rustloc", path = "rustloc" }]
simple-gal = [
  { repo = "arthur-debert/simple-gal", path = "simple-gal/simple-gal" },
  { repo = "arthur-debert/simple-gal-ui", path = "simple-gal/simple-gal-ui" },
]
standout = [{ repo = "arthur-debert/standout", path = "standout" }]
