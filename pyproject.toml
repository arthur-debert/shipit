[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "shipit"
version = "0.0.1"
description = "Portfolio standardization tooling — provisioning, gh-setup, lint, PR flow, release — on pixi."
requires-python = ">=3.11"
# Runtime deps are pure-python wheel pulls (no native build step):
#   click  — the CLI framework backing the `shipit <command>` tree.
#   PyYAML — parse a target repo's workflow files for required-check discovery.
dependencies = [
    "click>=8,<9",
    "PyYAML>=6",
]

[project.scripts]
shipit = "shipit.cli:main"

[dependency-groups]
dev = ["pytest>=8"]

[tool.hatch.build.targets.wheel]
packages = ["src/shipit"]

# Vendor the managed skills into the wheel as package data. skills/ lives at the
# repo root (it is also shipit's own Claude skill set), so it is force-included
# rather than re-homed under src/. It is OUTSIDE src/shipit, so this does not
# collide with the packages= bundling above (no double-add).
[tool.hatch.build.targets.wheel.force-include]
"skills" = "shipit/data/skills"

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-q"
