[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "shipit"
version = "0.0.1"
description = "Portfolio standardization tooling — provisioning, gh-setup, lint, PR flow, release — on pixi."
requires-python = ">=3.11"
# Runtime deps are pure-python wheel pulls (no native build step):
#   click  — the CLI framework backing the `shipit <command>` tree.
#   PyYAML — parse a target repo's workflow files for required-check discovery.
dependencies = [
    "click>=8,<9",
    "PyYAML>=6",
]

[project.scripts]
shipit = "shipit.cli:main"

[dependency-groups]
dev = ["pytest>=8"]

[tool.hatch.build.targets.wheel]
packages = ["src/shipit"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-q"
